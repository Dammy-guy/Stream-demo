<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamify - Video Calling App</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Simple Icons (Phosphor Icons) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Styles & Scripts -->
    <link rel="stylesheet" href="/css/styles.css">
    <script src="/js/socket.io.js" defer></script>
    <script src="/js/main.js" defer></script>
</head>
<body>
    <div class="app-background">
        <!-- Abstract gradient blobs for aesthetic -->
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="main-container">
        <!-- Left Sidebar: Contacts -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <i class="ph-fill ph-video-camera logo-icon"></i>
                <h2>Streamify</h2>
                <div class="theme-switch-wrapper">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" />
                        <div class="slider round">
                            <i class="ph-fill ph-moon"></i>
                            <i class="ph-fill ph-sun"></i>
                        </div>
                    </label>
                </div>
            </div>
            
            <button id="btn-invite" class="btn-premium-invite">
                <i class="ph-bold ph-link"></i>
                <span>Copy Invite Link</span>
            </button>
            
            <div class="contacts-section">
                <h3 class="section-title">Online Contacts</h3>
                <ul id="allusers" class="contact-list">
                    <li class="contact-item active-user">
                        <div class="avatar-container">
                            <div class="avatar" id="local-avatar">Y</div>
                            <span class="status online"></span>
                        </div>
                        <span class="user-name" id="local-user-name">Loading...</span>
                    </li>
                </ul>
            </div>
        </aside>

        <!-- Right Side: Video Area -->
        <section class="video-area">
            
            <!-- Video Grid -->
            <div class="video-grid" id="video-grid">
                <!-- Remote Video Area -->
                <div class="video-box glass-panel" id="remote-wrapper">
                    <video autoplay playsinline id="remote-video" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover;"></video>
                </div>
            </div>

            <!-- Local Video (PIP style) -->
            <div class="local-video glass-panel">
                <video autoplay muted playsinline id="local-video" style="width: 100%; height: 100%; object-fit: cover; border-radius: 16px;"></video>
            </div>

            <!-- Bottom Controls Bar -->
            <div class="controls-bar glass-panel">
                <button class="control-btn" id="btn-mic" title="Toggle Microphone">
                    <i class="ph-fill ph-microphone"></i>
                </button>
                <button class="control-btn" id="btn-video" title="Toggle Video">
                    <i class="ph-fill ph-video-camera"></i>
                </button>
                <button class="control-btn" id="btn-screen" title="Share Screen">
                    <i class="ph-bold ph-screencast"></i>
                </button>
                <button class="control-btn" id="btn-fullscreen" title="Full Screen">
                    <i class="ph-bold ph-corners-out"></i>
                </button>
                <button class="control-btn btn-danger" id="btn-end" title="End Call">
                    <i class="ph-fill ph-phone-disconnect"></i>
                </button>
            </div>

        </section>
    </main>

    <!-- Incoming Call Modal -->
    <div id="incoming-call-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <div class="modal-avatar"><i class="ph-fill ph-phone-ringing"></i></div>
            <h3 id="caller-name-display">Incoming Call...</h3>
            <p>from <span id="caller-name-span" style="font-weight: bold; color: var(--accent-color);">Someone</span></p>
            <div class="modal-actions">
                <button id="btn-accept" class="control-btn" style="background: var(--success); color: white;"><i class="ph-bold ph-phone"></i></button>
                <button id="btn-decline" class="control-btn btn-danger"><i class="ph-bold ph-phone-disconnect"></i></button>
            </div>
        </div>
    </div>

</body>
</html>
